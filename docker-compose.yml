name: noagent4u

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-noagent4u}
      POSTGRES_USER: ${POSTGRES_USER:-noagent4u}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-noagent4u_dev_password}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - noagent4u

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    networks:
      - noagent4u

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@noagent4u.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-noagent4u_pgadmin_password}
    ports:
      - '${PGADMIN_PORT:-5050}:80'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'python3 -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:80/misc/ping'')"',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - noagent4u

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-noagent4u}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-noagent4u_minio_password}
    ports:
      - '${MINIO_API_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://127.0.0.1:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    networks:
      - noagent4u

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    command: --database /data/mailpit.db
    ports:
      - '${MAILPIT_SMTP_PORT:-1025}:1025'
      - '${MAILPIT_UI_PORT:-8025}:8025'
    volumes:
      - mailpit_data:/data
    healthcheck:
      test:
        ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://127.0.0.1:8025/livez || exit 1']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - noagent4u

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:
  minio_data:
  mailpit_data:

networks:
  noagent4u:
    name: noagent4u-network
    driver: bridge
