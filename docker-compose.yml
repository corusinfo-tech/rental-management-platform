version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: rentalos-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

    networks:
      - rentalos

  redis:
    image: redis:7-alpine
    container_name: rentalos-redis
    restart: unless-stopped

    command: redis-server --appendonly yes

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

    networks:
      - rentalos

  api:
    container_name: rentalos-api
    build:
      context: .
      dockerfile: apps/api/Dockerfile

    restart: unless-stopped

    env_file:
      - .env.production

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    ports:
      - "127.0.0.1:3101:3001"

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 5

    networks:
      - rentalos

  web:
    container_name: rentalos-web

    build:
      context: .
      dockerfile: apps/web/Dockerfile

    restart: unless-stopped

    depends_on:
      api:
        condition: service_started

    env_file:
      - .env.production

    environment:
      NEXT_PUBLIC_API_URL: https://api.noagent4u.com/api/v1

    ports:
      - "127.0.0.1:3100:3000"

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 5

    networks:
      - rentalos

networks:
  rentalos:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
