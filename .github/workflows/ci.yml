name: CI
on: [push, pull_request]
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build

  migration-image-merge-gate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      RELEASE_SHA: ${{ github.event.pull_request.head.sha }}
      IMAGE_SOURCE: https://github.com/corusinfo-tech/rental-management-platform
      APP_ENV_FILE: .env.production.example
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Verify checked-out release SHA
        run: |
          test "$(git rev-parse HEAD)" = "$RELEASE_SHA"
          printf '%s\n' "$RELEASE_SHA" | grep -Eq '^[0-9a-f]{40}$'

      - name: Verify Compose rejects a missing release SHA
        run: |
          missing_sha_env="$RUNNER_TEMP/missing-release-sha.env"
          grep -v '^RELEASE_SHA=' .env.production.example > "$missing_sha_env"
          if env -u RELEASE_SHA docker compose \
            --env-file "$missing_sha_env" \
            -f docker-compose.production.yml \
            config --quiet 2>"$RUNNER_TEMP/missing-release-sha.log"; then
            echo 'Compose unexpectedly accepted a missing RELEASE_SHA' >&2
            exit 1
          fi
          grep -Fq 'RELEASE_SHA' "$RUNNER_TEMP/missing-release-sha.log"

      - name: Build SHA-qualified application images
        run: |
          docker compose --profile release \
            --env-file .env.production.example \
            -f docker-compose.production.yml \
            build migrate api worker web

      - name: Verify image tags and OCI labels
        run: |
          for service in api web worker migrate; do
            image="noagent4u-${service}:${RELEASE_SHA}"
            test "$(docker image inspect --format '{{index .Config.Labels "org.opencontainers.image.source"}}' "$image")" = "$IMAGE_SOURCE"
            test "$(docker image inspect --format '{{index .Config.Labels "org.opencontainers.image.revision"}}' "$image")" = "$RELEASE_SHA"
          done

      - name: Verify migration image command
        run: |
          image="noagent4u-migrate:${RELEASE_SHA}"
          expected='["/app/node_modules/.bin/prisma","migrate","deploy","--schema","prisma/schemas"]'
          actual="$(docker image inspect --format '{{json .Config.Cmd}}' "$image")"
          test "$actual" = "$expected"

      - name: Verify database-free migration image contents
        run: |
          image="noagent4u-migrate:${RELEASE_SHA}"
          expected_schemas="$RUNNER_TEMP/expected-schemas.txt"
          actual_schemas="$RUNNER_TEMP/actual-schemas.txt"
          expected_migrations="$RUNNER_TEMP/expected-migrations.txt"
          actual_migrations="$RUNNER_TEMP/actual-migrations.txt"

          git ls-files 'prisma/schemas/*.prisma' | sort > "$expected_schemas"
          git ls-files 'prisma/migrations/*/migration.sql' | sort > "$expected_migrations"
          test -s "$expected_schemas"
          test -s "$expected_migrations"

          docker run --rm --network none --entrypoint /bin/sh "$image" -ceu '
            version_output="$(/app/node_modules/.bin/prisma --version)"
            printf "%s\n" "$version_output" | grep -Eq "^prisma[[:space:]]+:[[:space:]]+6\\.19\\.3$"
            test -f /app/prisma.config.ts
            test -d /app/prisma/schemas
            test -d /app/prisma/migrations
          '

          docker run --rm --network none --entrypoint /bin/sh "$image" \
            -c "find /app/prisma/schemas -maxdepth 1 -type f -name '*.prisma' -print" \
            | sed 's#^/app/##' | sort > "$actual_schemas"
          docker run --rm --network none --entrypoint /bin/sh "$image" \
            -c "find /app/prisma/migrations -mindepth 2 -maxdepth 2 -type f -name migration.sql -print" \
            | sed 's#^/app/##' | sort > "$actual_migrations"

          diff -u "$expected_schemas" "$actual_schemas"
          diff -u "$expected_migrations" "$actual_migrations"

      - name: Verify Compose release gate
        run: |
          rendered_compose="$RUNNER_TEMP/rendered-compose.json"
          docker compose --profile release \
            --env-file .env.production.example \
            -f docker-compose.production.yml \
            config --quiet
          docker compose --profile release \
            --env-file .env.production.example \
            -f docker-compose.production.yml \
            config --format json > "$rendered_compose"

          jq -e '.services.migrate.profiles == ["release"]' "$rendered_compose" > /dev/null
          jq -e --arg sha "$RELEASE_SHA" '
            .services.api.image == "noagent4u-api:\($sha)" and
            .services.web.image == "noagent4u-web:\($sha)" and
            .services.worker.image == "noagent4u-worker:\($sha)" and
            .services.migrate.image == "noagent4u-migrate:\($sha)" and
            .services.api.build.args.RELEASE_SHA == $sha and
            .services.web.build.args.RELEASE_SHA == $sha and
            .services.worker.build.args.RELEASE_SHA == $sha and
            .services.migrate.build.args.RELEASE_SHA == $sha
          ' "$rendered_compose" > /dev/null

          default_services="$(docker compose \
            --env-file .env.production.example \
            -f docker-compose.production.yml \
            config --services)"
          release_services="$(docker compose --profile release \
            --env-file .env.production.example \
            -f docker-compose.production.yml \
            config --services)"

          ! grep -Fxq migrate <<< "$default_services"
          grep -Fxq migrate <<< "$release_services"
